version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI:-}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-global}
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      # Mount Google Cloud application default credentials for Vertex AI authentication (Linux/macOS)
      - ${HOME:-~}/.config/gcloud:/root/.config/gcloud:ro
      # Share the tmp_uploads folder with frontend
      - ./tmp_uploads:/tmp_uploads
    # Override default port to 8000 so frontend can query backend internally on port 8000
    command: ["uv", "run", "uvicorn", "app.fast_api_app:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      # Share the tmp_uploads folder with backend
      - ./tmp_uploads:/tmp_uploads
    depends_on:
      - backend
